<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark Canvas -->
  <rect width="512" height="512" fill="#1A1A1A"/>
  
  <!-- Deep architectural grid -->
  <g stroke="#FDFBF7" stroke-width="1" opacity="0.05">
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
  </g>

  <!-- The "D" Element : Represents Data & The Brand -->
  <path d="M128 128 H256 A128 128 0 0 1 256 384 H128 Z" fill="#FDFBF7"/>
  
  <!-- Inner negative space for the 'D' -->
  <path d="M192 192 H256 A64 64 0 0 1 256 320 H192 Z" fill="#1A1A1A"/>
  
  <!-- The Underscore "_" : Represents the digital bridge & LZ (Landing Zone) -->
  <rect x="192" y="320" width="192" height="64" fill="#D46B4A"/>
  
  <!-- The AI Spark : Representing Intelligence Augmented -->
  <circle cx="384" cy="384" r="32" fill="#D46B4A"/>
</svg>