<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DGT_LZ Instagram Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian-dark: #1A1A1A;
            --pristine-white: #FDFBF7;
            --terracotta-rust: #D46B4A;
            --grid-line: rgba(253, 251, 247, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 50px 0;
        }

        /* IG Post Container (1080x1080) */
        .poster {
            width: 1080px;
            height: 1080px;
            background-color: var(--obsidian-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 80px;
            color: var(--pristine-white);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        /* Ambient Grid Background */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 108px 108px; /* 10x10 Grid */
            pointer-events: none;
        }

        /* Header / Logo */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 1;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            letter-spacing: 0.1em;
            display: flex;
            align-items: baseline;
        }

        .logo span {
            color: var(--terracotta-rust);
            font-size: 60px;
            margin-left: 2px;
            line-height: 0;
        }

        .tagline-small {
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 0.4em;
            color: var(--terracotta-rust);
            font-weight: 600;
        }

        /* Main Content */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 105px;
            line-height: 1;
            margin-bottom: 40px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .headline span {
            display: block;
            opacity: 0.9;
        }

        .body-text {
            font-size: 32px;
            line-height: 1.4;
            max-width: 800px;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 60px;
        }

        /* CTA Section */
        .cta-container {
            display: flex;
            align-items: center;
            gap: 30px;
            z-index: 1;
        }

        .cta-box {
            background-color: var(--terracotta-rust);
            color: var(--obsidian-dark);
            padding: 30px 50px;
            font-weight: 600;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .cta-label {
            font-size: 20px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 60px;
            border-top: 1px solid rgba(253, 251, 247, 0.1);
            z-index: 1;
        }

        .footer-info {
            font-size: 18px;
            opacity: 0.5;
            letter-spacing: 0.1em;
        }

        .footer-url {
            font-size: 24px;
            font-weight: 600;
            color: var(--terracotta-rust);
        }

        /* Decorative Elements */
        .spark-bg {
            position: absolute;
            bottom: -150px;
            right: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--terracotta-rust) 0%, transparent 70%);
            opacity: 0.05;
            pointer-events: none;
        }

        /* Download Button Styling */
        .download-btn {
            margin-top: 40px;
            padding: 20px 40px;
            background-color: var(--terracotta-rust);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="poster" id="poster">
        <div class="grid"></div>
        <div class="spark-bg"></div>

        <div class="header">
            <div class="logo">DGT_LZ<span>.</span></div>
            <div class="tagline-small">Scale Autonomously</div>
        </div>

        <div class="main">
            <h1 class="headline">
                <span>Intelligence</span>
                <span style="color: var(--terracotta-rust); font-style: italic;">Augmented.</span>
            </h1>
            <p class="body-text">
                Otomasi Bisnis. Transformasi sistem legacy Anda menjadi infrastruktur AI otonom yang bekerja 24/7.
            </p>
            
            <div class="cta-container">
                <div class="cta-box">Klaim AI Blueprint</div>
                <div class="cta-label">Tanpa Biaya</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-info">
                Digital Landing Zone<br>
                Denpasar, Bali 80111
            </div>
            <div class="footer-url">dgt-lz.agency</div>
        </div>
    </div>

    <button class="download-btn" onclick="downloadPoster()">Download as High-Res PNG</button>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        function downloadPoster() {
            const poster = document.getElementById('poster');
            html2canvas(poster, {
                scale: 2, // Double resolution for IG
                backgroundColor: '#1A1A1A',
                logging: false,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'dgt_lz_ig_poster.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
